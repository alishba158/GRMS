{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Sent - GRMS | FUUAST</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>

<!-- ===== NAVBAR ===== -->
<nav class="navbar" id="navbar">
    <div class="nav-left">
        <img src="{% static 'images/logo.png' %}" alt="GRMS Logo" class="logo">
        <span class="brand-name">GRMS</span>
    </div>
    <div class="nav-right">
        <a href="{% url 'home' %}" class="nav-link">Home</a>
        <a href="{% url 'login' %}" class="login-btn">Login</a>
    </div>
</nav>

<!-- ===== SUCCESS MESSAGE ===== -->
<div class="auth-container">
    <div class="auth-card" data-aos="fade-up">
        <div class="text-center">
            <i class="fas fa-check-circle" style="font-size: 4rem; color: #28a745;"></i>
            <h3 class="mt-3">✅ Request Submitted!</h3>
            <p class="text-muted">Your password reset request has been sent to the admin.</p>
            <div class="alert alert-info">
                <i class="fas fa-info-circle"></i>
                You will be notified when the admin resets your password.
            </div>
            <a href="{% url 'login' %}" class="auth-btn mt-3">
                <i class="fas fa-arrow-left"></i> Back to Login
            </a>
        </div>
    </div>
</div>

<script>
    // Auto redirect after 5 seconds
    setTimeout(function() {
        window.location.href = "{% url 'login' %}";
    }, 5000);
</script>
</body>
</html>
